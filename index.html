<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
    <title>德军总部 · 联机射击</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a14; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; max-width: 100vw; max-height: 100vh; cursor: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }

        #mainMenu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a14 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; transition: opacity 0.3s;
        }
        #mainMenu.hidden { opacity: 0; pointer-events: none; }
        .menu-title { font-size: 48px; font-weight: 800; color: #c0d0ff; text-shadow: 0 0 20px rgba(100,150,255,0.6); letter-spacing: 8px; margin-bottom: 8px; }
        .menu-subtitle { font-size: 18px; color: rgba(200,210,255,0.7); letter-spacing: 4px; margin-bottom: 60px; }
        .menu-btn {
            width: 220px; padding: 14px 0; margin: 12px 0;
            background: rgba(30,40,80,0.8); border: 1px solid rgba(100,130,255,0.5);
            border-radius: 8px; color: #d0e0ff; font-size: 20px; font-weight: 600;
            cursor: pointer; text-align: center; letter-spacing: 2px;
            backdrop-filter: blur(10px); transition: all 0.2s;
            box-shadow: 0 0 15px rgba(50,80,200,0.3);
        }
        .menu-btn:hover { background: rgba(40,60,120,0.9); transform: scale(1.05); }
        .menu-btn:active { transform: scale(0.98); }

        #roomPanel, #settingsPanel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(10,15,30,0.95); border: 1px solid #3a5f9a; border-radius: 16px;
            padding: 30px; z-index: 20; color: #d0e0ff; display: none; flex-direction: column; gap: 20px;
            width: 320px; text-align: center;
        }
        #settingsPanel { width: 360px; }
        #roomPanel input, #settingsPanel input[type="text"], #settingsPanel input[type="number"] {
            background: #1a1f35; border: 1px solid #3a4a6a; color: #fff; padding: 8px; border-radius: 6px;
        }
        button { padding: 10px; background: #2a3f6a; border: none; border-radius: 8px; color: white; cursor: pointer; }
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
        }
        .setting-row label { font-size: 14px; }
        .setting-row input[type="range"] { width: 130px; }
        .hint {
            position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
            color:rgba(255,255,255,0.4); font-size:11px; pointer-events:none; z-index:5;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="mainMenu">
        <div class="menu-title">德军总部</div>
        <div class="menu-subtitle">联机射击</div>
        <div class="menu-btn" id="btnSolo">单人模式</div>
        <div class="menu-btn" id="btnMultiplayer">联机对战</div>
        <div class="menu-btn" id="btnSettings">设置</div>
    </div>

    <!-- 房间面板 -->
    <div id="roomPanel">
        <h3 id="roomTitle">联机房间</h3>
        <div id="roomCreateSection"><button id="btnCreateRoom">创建房间</button></div>
        <div id="roomJoinSection"><input type="text" id="roomCodeInput" placeholder="输入房间码" maxlength="6"><button id="btnJoinRoom">加入房间</button></div>
        <div id="roomStatus" style="margin-top:10px;"></div>
        <button id="btnRoomSettings">游戏设置</button>
        <button id="btnBackToMenu" style="margin-top:5px;">返回菜单</button>
    </div>

    <!-- 设置面板（联机/单人均可调用） -->
    <div id="settingsPanel">
        <h3>游戏设置</h3>
        <div class="setting-row"><label>地图尺寸</label><input type="range" id="mapSize" min="50" max="512" value="256" step="16"><input type="number" id="mapSizeVal" value="256" min="50" max="512" style="width:60px;"></div>
        <div class="setting-row"><label>房间数量</label><input type="range" id="roomCount" min="10" max="100" value="50" step="1"><input type="number" id="roomCountVal" value="50" min="10" max="100" style="width:60px;"></div>
        <div class="setting-row"><label>最小房间尺寸</label><input type="range" id="minRoomSize" min="3" max="10" value="5" step="1"><input type="number" id="minRoomSizeVal" value="5" min="3" max="10" style="width:60px;"></div>
        <div class="setting-row"><label>最大房间尺寸</label><input type="range" id="maxRoomSize" min="5" max="20" value="12" step="1"><input type="number" id="maxRoomSizeVal" value="12" min="5" max="20" style="width:60px;"></div>
        <div class="setting-row"><label>走廊宽度</label><input type="range" id="corridorWidth" min="1" max="4" value="2" step="1"><input type="number" id="corridorWidthVal" value="2" min="1" max="4" style="width:60px;"></div>
        <div class="setting-row"><label>生成敌人</label><input type="checkbox" id="enableEnemies" checked></div>
        <button id="btnSaveSettings">保存设置</button>
    </div>

    <div class="hint">🖱️ 点击锁定 | WASD移动 | 鼠标转向 | 左键射击 | R重生(联机) | ESC退出</div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://yjzkuvrmvaapclhzmifn.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_-d82le_uNTK0eqCjChBJBw_2yKLtIIR';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // 游戏设置（单人和联机共用）
            let gameSettings = {
                MAP_SIZE: 256, ROOM_COUNT: 50, MIN_ROOM_SIZE: 5, MAX_ROOM_SIZE: 12,
                CORRIDOR_WIDTH: 2, ENABLE_ENEMIES: true
            };

            // UI 同步
            const mapSizeRange = document.getElementById('mapSize'), mapSizeVal = document.getElementById('mapSizeVal');
            const roomCountRange = document.getElementById('roomCount'), roomCountVal = document.getElementById('roomCountVal');
            const minRoomSizeRange = document.getElementById('minRoomSize'), minRoomSizeVal = document.getElementById('minRoomSizeVal');
            const maxRoomSizeRange = document.getElementById('maxRoomSize'), maxRoomSizeVal = document.getElementById('maxRoomSizeVal');
            const corridorWidthRange = document.getElementById('corridorWidth'), corridorWidthVal = document.getElementById('corridorWidthVal');
            const enableEnemiesCheck = document.getElementById('enableEnemies');

            function syncUISettings() {
                mapSizeRange.value = mapSizeVal.value = gameSettings.MAP_SIZE;
                roomCountRange.value = roomCountVal.value = gameSettings.ROOM_COUNT;
                minRoomSizeRange.value = minRoomSizeVal.value = gameSettings.MIN_ROOM_SIZE;
                maxRoomSizeRange.value = maxRoomSizeVal.value = gameSettings.MAX_ROOM_SIZE;
                corridorWidthRange.value = corridorWidthVal.value = gameSettings.CORRIDOR_WIDTH;
                enableEnemiesCheck.checked = gameSettings.ENABLE_ENEMIES;
            }
            syncUISettings();

            function saveUISettings() {
                gameSettings.MAP_SIZE = parseInt(mapSizeVal.value);
                gameSettings.ROOM_COUNT = parseInt(roomCountVal.value);
                gameSettings.MIN_ROOM_SIZE = parseInt(minRoomSizeVal.value);
                gameSettings.MAX_ROOM_SIZE = parseInt(maxRoomSizeVal.value);
                gameSettings.CORRIDOR_WIDTH = parseInt(corridorWidthVal.value);
                gameSettings.ENABLE_ENEMIES = enableEnemiesCheck.checked;
                document.getElementById('settingsPanel').style.display = 'none';
            }

            document.getElementById('btnSaveSettings').addEventListener('click', saveUISettings);
            document.getElementById('btnRoomSettings').addEventListener('click', () => {
                syncUISettings();
                document.getElementById('settingsPanel').style.display = 'flex';
            });

            let gameState = 'menu';
            let isMultiplayer = false, isHost = false;
            let myUserId = Math.random().toString(36).substr(2, 9);
            let roomId = null;
            let remotePlayers = new Map();
            let subscriptions = [];

            const player = { x:0, z:0, angle:0, eyeHeight:1.6, health:100, score:0 };
            let bulletHoles = [];
            let gunRecoil=0, gunFlash=0, shootCooldown=0, screenShake=0;
            const input = { forward:false, backward:false, left:false, right:false, shoot:false };
            let touchShooting=false, mouseDX=0;
            let currentWeapon, weapons;
            let enemies=[], healthPacks=[], weaponPickups=[], ammoPacks=[];
            let map=[], walls=[];
            const WALL_HEIGHT=5.0, ENEMY_HEIGHT=1.8, ENEMY_CHASE_DIST=16;

            let enemyImg = new Image();
            enemyImg.src = 'https://i.mituw.com/imgs/2026/03/15/de4945abb96be550.jpg';

            let audioCtx=null;
            function initAudio() { if(!audioCtx) try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
            function playTone(f,d,t='square',v=0.08){ if(!audioCtx)return; let o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d); }

            function initWeapons(){
                weapons={
                    pistol:{name:'手枪',fireRate:0.5,damage:1,ammo:Infinity,maxAmmo:Infinity,spread:0,bullets:1,fullAuto:false,sound:()=>playTone(120,0.1,'square',0.15),shake:0.08,recoil:1.0},
                    ak47:{name:'AK-47',fireRate:0.15,damage:1,ammo:30,maxAmmo:30,spread:0.03,bullets:1,fullAuto:true,sound:()=>playTone(150,0.08,'sawtooth',0.18),shake:0.06,recoil:0.6},
                    aug:{name:'AUG',fireRate:0.12,damage:1,ammo:25,maxAmmo:25,spread:0.01,bullets:1,fullAuto:true,sound:()=>playTone(180,0.06,'square',0.12),shake:0.04,recoil:0.3},
                    shotgun:{name:'霰弹枪',fireRate:0.8,damage:1,ammo:8,maxAmmo:8,spread:0.2,bullets:5,fullAuto:false,sound:()=>{playTone(80,0.15,'sawtooth',0.2);playTone(60,0.2,'square',0.15);},shake:0.15,recoil:1.5}
                };
                currentWeapon={...weapons.pistol,ammo:weapons.pistol.maxAmmo};
            }
            initWeapons();

            function inBounds(x,z){ return x>=0&&x<MAP_SIZE&&z>=0&&z<MAP_SIZE; }
            function isWallAt(wx,wz,r=0.25){ for(let [cx,cz] of [[wx-r,wz-r],[wx+r,wz-r],[wx-r,wz+r],[wx+r,wz+r]]){ let ix=cx|0,iz=cz|0; if(!inBounds(ix,iz)||map[ix][iz]===1) return true; } return false; }

            let W,H,centerX,centerY,focalLength;
            function resize(){ let w=Math.min(window.innerWidth,1000),h=w/1.777; if(h>window.innerHeight*0.95){ h=window.innerHeight*0.95; w=h*1.777; } W=Math.floor(w); H=Math.floor(h); canvas.width=W; canvas.height=H; centerX=W/2; centerY=H/2; focalLength=W*0.75; }
            resize(); window.addEventListener('resize',resize);

            function project(wx,wy,wz){
                let dx=wx-player.x,dz=wz-player.z,s=Math.sin(player.angle),c=Math.cos(player.angle);
                let camX=dx*c+dz*s,camZ=dx*s-dz*c,camY=wy-player.eyeHeight;
                if(camZ<=0.01) return null;
                return {x:centerX+(camX/camZ)*focalLength,y:centerY-(camY/camZ)*focalLength,z:camZ};
            }
            function ab(hex,f){ let n=parseInt(hex.slice(1),16); return `rgb(${Math.min(255,((n>>16)&0xff)*f)},${Math.min(255,((n>>8)&0xff)*f)},${Math.min(255,(n&0xff)*f)})`; }
            function drawWall(w1,w2,h,color,bri){ let p1=project(w1.x,0,w1.z),p2=project(w2.x,0,w2.z); if(!p1||!p2)return; let t1=project(w1.x,h,w1.z),t2=project(w2.x,h,w2.z); if(!t1||!t2)return; ctx.fillStyle=ab(color,bri); ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(t2.x,t2.y);ctx.lineTo(t1.x,t1.y);ctx.closePath();ctx.fill(); }
            function drawEnemy(e){
                if(!enemyImg.complete) return;
                if(e.deadTimer>0){ let a=e.deadTimer/1.5,p=project(e.x,0,e.z); if(!p||p.z<=0.1)return; let s=(focalLength*0.4)/p.z*a; ctx.globalAlpha=a;ctx.fillStyle='#f00';ctx.fillRect(p.x-s/2,p.y-s,s,s);ctx.globalAlpha=1;return; }
                if(!e.alive)return;
                let p=project(e.x,0,e.z); if(!p||p.z<=0.1)return;
                let t=project(e.x,ENEMY_HEIGHT,e.z); if(!t)return;
                let h=p.y-t.y,w=h*0.8;
                let hpPct=e.hp/e.maxHp;
                ctx.fillStyle='#600';ctx.fillRect(p.x-w/2,t.y-6,w,4);
                ctx.fillStyle='#0f0';ctx.fillRect(p.x-w/2,t.y-6,w*hpPct,4);
                ctx.drawImage(enemyImg,p.x-w/2,t.y,w,h);
            }
            function drawHealthPack(h){ if(!h.alive)return; let p=project(h.x,0.3,h.z); if(!p||p.z<=0.1)return; let s=(focalLength*0.25)/p.z; ctx.fillStyle='#fff';ctx.fillRect(p.x-s/2,p.y-s,s,s); ctx.fillStyle='#e00'; let bw=s*0.3,bh=s*0.8; ctx.fillRect(p.x-bw/2,p.y-s*0.9,bw,bh); ctx.fillRect(p.x-bh/2,p.y-s*0.55,bh,bw); }
            function drawWeaponPickup(p){ if(!p.alive)return; let p3=project(p.x,0.4,p.z); if(!p3||p3.z<=0.1)return; let s=(focalLength*0.25)/p3.z; ctx.fillStyle='#ffaa00';ctx.fillRect(p3.x-s/2,p3.y-s,s,s); ctx.fillStyle='#000';ctx.font=`bold ${Math.max(8,s*0.5)}px system-ui`;ctx.textAlign='center'; let l=p.type==='ak47'?'AK':p.type==='aug'?'AU':'SG'; ctx.fillText(l,p3.x,p3.y-s*0.3); }
            function drawAmmoPack(a){ if(!a.alive)return; let p=project(a.x,0.3,a.z); if(!p||p.z<=0.1)return; let s=(focalLength*0.2)/p.z; ctx.fillStyle='#0a0';ctx.fillRect(p.x-s/2,p.y-s,s,s); ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(8,s*0.6)}px system-ui`;ctx.fillText('弹',p.x,p.y-s*0.3); }
            function drawRemotePlayer(id,data){
                if(!data.is_alive)return;
                let p=project(data.x,0,data.z); if(!p||p.z<=0.1)return;
                let s=(focalLength*0.35)/p.z;
                ctx.fillStyle='#00f';ctx.fillRect(p.x-s/2,p.y-s,s,s);
                ctx.fillStyle='#fff';ctx.font='10px system-ui';ctx.fillText(id.substr(0,4),p.x,p.y-s-5);
                ctx.fillStyle='#600';ctx.fillRect(p.x-s/2,p.y-s-10,s,3);
                ctx.fillStyle='#0f0';ctx.fillRect(p.x-s/2,p.y-s-10,s*(data.health/100),3);
            }

            // 随机数种子生成器（用于确定性地图）
            function seededRandom(seed) {
                let x = Math.sin(seed) * 10000;
                return x - Math.floor(x);
            }

            function generateLocalMap(settings){
                const {MAP_SIZE, ROOM_COUNT, MIN_ROOM_SIZE, MAX_ROOM_SIZE, CORRIDOR_WIDTH, ENABLE_ENEMIES} = settings;
                // 设置全局 MAP_SIZE
                window.MAP_SIZE = MAP_SIZE; // 使 inBounds 可用
                map = Array.from({length: MAP_SIZE}, () => new Array(MAP_SIZE).fill(1));
                let rooms = [];
                let attempts = 500;
                for (let r=0; r<ROOM_COUNT && attempts>0; r++) {
                    let rw = MIN_ROOM_SIZE + Math.floor(seededRandom(r*3+1) * (MAX_ROOM_SIZE - MIN_ROOM_SIZE + 1));
                    let rh = MIN_ROOM_SIZE + Math.floor(seededRandom(r*5+2) * (MAX_ROOM_SIZE - MIN_ROOM_SIZE + 1));
                    let rx = 2 + Math.floor(seededRandom(r*7+3) * (MAP_SIZE - rw - 4));
                    let rz = 2 + Math.floor(seededRandom(r*11+4) * (MAP_SIZE - rh - 4));
                    let overlap = false;
                    for (let i=rx-3; i<rx+rw+3 && !overlap; i++) for (let j=rz-3; j<rz+rh+3 && !overlap; j++) if (inBounds(i,j) && map[i][j]===0) overlap=true;
                    if (!overlap) {
                        rooms.push({x:rx, z:rz, w:rw, h:rh, cx:rx+rw/2, cz:rz+rh/2});
                        for (let i=rx; i<rx+rw; i++) for (let j=rz; j<rz+rh; j++) if (inBounds(i,j)) map[i][j]=0;
                    } else { attempts--; r--; }
                }
                if (rooms.length===0) { rooms.push({x:10,z:10,w:10,h:10,cx:15,cz:15}); for (let i=10;i<20;i++) for (let j=10;j<20;j++) map[i][j]=0; }
                // Prim连接
                let connected=[rooms[0]], unconnected=rooms.slice(1);
                while (unconnected.length) {
                    let best=Infinity, bestA, bestB, bestIdx;
                    for (let a of connected) for (let k=0; k<unconnected.length; k++) {
                        let b = unconnected[k], d = (a.cx-b.cx)**2 + (a.cz-b.cz)**2;
                        if (d<best) { best=d; bestA=a; bestB=b; bestIdx=k; }
                    }
                    if (!bestB) break;
                    let cx1=Math.floor(bestA.cx), cz1=Math.floor(bestA.cz), cx2=Math.floor(bestB.cx), cz2=Math.floor(bestB.cz);
                    for (let x=Math.min(cx1,cx2); x<=Math.max(cx1,cx2); x++) for (let w=0; w<CORRIDOR_WIDTH; w++) if (inBounds(x,cz1+w)) map[x][cz1+w]=0;
                    for (let z=Math.min(cz1,cz2); z<=Math.max(cz1,cz2); z++) for (let w=0; w<CORRIDOR_WIDTH; w++) if (inBounds(cx2+w,z)) map[cx2+w][z]=0;
                    connected.push(bestB); unconnected.splice(bestIdx,1);
                }
                // 墙面生成
                walls=[]; const wallSet=new Set(); const colors=['#8b7355','#7d8a7a','#9e8c7b','#a09080','#b0a090','#c0b0a0','#6b8c9e','#8a7d6b','#7a6b5a','#9d8b7b'];
                const addWall=(x1,z1,x2,z2,col)=>{ let k=`${x1},${z1},${x2},${z2}`; if(!wallSet.has(k)){ wallSet.add(k); walls.push({x1,z1,x2,z2,h:WALL_HEIGHT,color:col}); } };
                for (let x=0; x<MAP_SIZE; x++) for (let z=0; z<MAP_SIZE; z++) {
                    if (map[x][z]!==0) continue;
                    let col=colors[(x*7+z*13)%colors.length];
                    if (x>0&&map[x-1][z]===1) addWall(x,z,x,z+1,col);
                    if (x<MAP_SIZE-1&&map[x+1][z]===1) addWall(x+1,z,x+1,z+1,col);
                    if (z>0&&map[x][z-1]===1) addWall(x,z,x+1,z,col);
                    if (z<MAP_SIZE-1&&map[x][z+1]===1) addWall(x,z+1,x+1,z+1,col);
                }
                // 玩家出生点
                player.x = rooms[0].cx; player.z = rooms[0].cz; player.angle = 0;
                // 敌人物品生成（根据开关）
                enemies=[]; healthPacks=[]; weaponPickups=[]; ammoPacks=[];
                if (ENABLE_ENEMIES) {
                    for (let i=1; i<rooms.length; i++) {
                        let r=rooms[i];
                        let count = 1 + Math.floor(seededRandom(i*13+7)*3);
                        for (let c=0; c<count; c++) {
                            enemies.push({
                                x: r.x+1+seededRandom(i*17+c*5)*(r.w-2), z: r.z+1+seededRandom(i*19+c*7)*(r.h-2),
                                alive:true, hp:2, maxHp:2, deadTimer:0, dodgeTimer:0, dodgeDir:0, rushTimer:0,
                                wanderAngle: seededRandom(i*23+c*11)*Math.PI*2, wanderTimer: 1+seededRandom(i*29+c*13)*3
                            });
                        }
                    }
                }
                // 物品（血包、武器、弹药）
                for (let i=1; i<rooms.length; i++) {
                    let r=rooms[i];
                    if (seededRandom(i*31+17) < 0.3) healthPacks.push({ x:r.x+1+seededRandom(i*37+19)*(r.w-2), z:r.z+1+seededRandom(i*41+23)*(r.h-2), alive:true });
                    if (seededRandom(i*43+29) < 0.25) {
                        let gunTypes=['ak47','aug','shotgun'];
                        let type = gunTypes[Math.floor(seededRandom(i*47+31)*3)];
                        weaponPickups.push({ x:r.x+1+seededRandom(i*53+37)*(r.w-2), z:r.z+1+seededRandom(i*59+41)*(r.h-2), type, alive:true });
                    }
                    if (seededRandom(i*61+43) < 0.2) ammoPacks.push({ x:r.x+1+seededRandom(i*67+47)*(r.w-2), z:r.z+1+seededRandom(i*71+53)*(r.h-2), alive:true });
                }
                for (let k=0; k<8; k++) { let hx=5+seededRandom(k*73+59)*(MAP_SIZE-10), hz=5+seededRandom(k*79+61)*(MAP_SIZE-10); if (inBounds(hx|0,hz|0) && map[hx|0][hz|0]===0) healthPacks.push({x:hx,z:hz,alive:true}); }
                for (let k=0; k<6; k++) { let wx=5+seededRandom(k*83+67)*(MAP_SIZE-10), wz=5+seededRandom(k*89+71)*(MAP_SIZE-10); if (inBounds(wx|0,wz|0) && map[wx|0][wz|0]===0) weaponPickups.push({x:wx,z:wz,type:['ak47','aug','shotgun'][Math.floor(seededRandom(k*97+73)*3)], alive:true}); }
                for (let k=0; k<8; k++) { let ax=5+seededRandom(k*101+79)*(MAP_SIZE-10), az=5+seededRandom(k*103+83)*(MAP_SIZE-10); if (inBounds(ax|0,az|0) && map[ax|0][az|0]===0) ammoPacks.push({x:ax,z:az,alive:true}); }
                return rooms;
            }

            // 射击逻辑（同上，略作调整）
            function hitEnemyWithRay(ox,oz,offset=0){
                let a=player.angle+offset, fx=Math.sin(a), fz=-Math.cos(a);
                for(let d=0; d<40; d+=0.25){
                    let wx=ox+fx*d, wz=oz+fz*d;
                    if(!inBounds(wx|0,wz|0) || map[wx|0][wz|0]===1) return null;
                    for(let e of enemies) if(e.alive && Math.hypot(wx-e.x, wz-e.z)<0.5) return e;
                }
                return null;
            }
            function shoot(){
                if(shootCooldown>0 || currentWeapon.ammo<=0) return;
                currentWeapon.ammo--; shootCooldown=currentWeapon.fireRate; gunRecoil=currentWeapon.recoil; gunFlash=0.12; currentWeapon.sound();
                let anyHit=false;
                for(let i=0; i<currentWeapon.bullets; i++){
                    let spread=(Math.random()-0.5)*currentWeapon.spread*2;
                    let enemy=hitEnemyWithRay(player.x, player.z, spread);
                    if(enemy){
                        enemy.hp--; anyHit=true;
                        if(enemy.hp<=0){ enemy.alive=false; enemy.deadTimer=1.5; player.score+=100; }
                        if(isMultiplayer && !isHost){
                            supabase.from('events').insert({room_id:roomId, sender_id:myUserId, type:'shoot_hit', data:{enemy_index:enemies.indexOf(enemy)}});
                        }
                    }
                }
                if(anyHit){ screenShake=Math.max(screenShake, currentWeapon.shake); playTone(200,0.08,'square',0.12); }
                // 弹孔
                for(let i=0; i<currentWeapon.bullets; i++){
                    let spread=(Math.random()-0.5)*currentWeapon.spread*2, a=player.angle+spread, fx=Math.sin(a), fz=-Math.cos(a);
                    let t=0, step=0.05;
                    while(t<40){ t+=step; let wx=player.x+fx*t, wz=player.z+fz*t, ix=wx|0, iz=wz|0; if(inBounds(ix,iz) && map[ix][iz]===1){ let t0=t-step, t1=t; for(let s=0;s<8;s++){ let mid=(t0+t1)/2, mx=player.x+fx*mid, mz=player.z+fz*mid; if(inBounds(mx|0,mz|0) && map[mx|0][mz|0]===1) t1=mid; else t0=mid; } bulletHoles.push({x:player.x+fx*t0, z:player.z+fz*t0, life:300}); if(bulletHoles.length>100) bulletHoles.shift(); break; } }
                }
                if(currentWeapon.ammo===0 && currentWeapon.name!=='手枪') currentWeapon={...weapons.pistol, ammo:weapons.pistol.maxAmmo};
            }

            function pickupItems(){
                for(let h of healthPacks){ if(!h.alive)continue; if(Math.hypot(player.x-h.x, player.z-h.z)<0.8){ h.alive=false; player.health=Math.min(100,player.health+25); playTone(600,0.1,'sine',0.1); if(isMultiplayer&&!isHost) supabase.from('events').insert({room_id:roomId, sender_id:myUserId, type:'pickup', data:{pickup_index:healthPacks.indexOf(h), pickup_type:'health'}}); } }
                for(let p of weaponPickups){ if(!p.alive)continue; if(Math.hypot(player.x-p.x, player.z-p.z)<0.8){ p.alive=false; if(p.type==='ak47') currentWeapon={...weapons.ak47, ammo:weapons.ak47.maxAmmo}; else if(p.type==='aug') currentWeapon={...weapons.aug, ammo:weapons.aug.maxAmmo}; else if(p.type==='shotgun') currentWeapon={...weapons.shotgun, ammo:weapons.shotgun.maxAmmo}; playTone(500,0.1,'sine',0.15); if(isMultiplayer&&!isHost) supabase.from('events').insert({room_id:roomId, sender_id:myUserId, type:'pickup', data:{pickup_index:weaponPickups.indexOf(p)+1000, pickup_type:p.type}}); } }
                for(let a of ammoPacks){ if(!a.alive)continue; if(Math.hypot(player.x-a.x, player.z-a.z)<0.8){ a.alive=false; if(currentWeapon.name!=='手枪') currentWeapon.ammo=Math.min(currentWeapon.maxAmmo, currentWeapon.ammo+5); playTone(400,0.1,'sine',0.12); if(isMultiplayer&&!isHost) supabase.from('events').insert({room_id:roomId, sender_id:myUserId, type:'pickup', data:{pickup_index:ammoPacks.indexOf(a)+2000, pickup_type:'ammo'}}); } }
            }

            function updateEnemies(dt){
                if(isMultiplayer && !isHost) return;
                if(!gameSettings.ENABLE_ENEMIES) return;
                for(let e of enemies){
                    if(e.deadTimer>0){ e.deadTimer-=dt; continue; }
                    if(!e.alive) continue;
                    let dx=player.x-e.x, dz=player.z-e.z, dist=Math.hypot(dx,dz);
                    if(dist<ENEMY_CHASE_DIST && dist>0.8){
                        let s=ENEMY_SPEED*dt;
                        if(e.dodgeTimer>0){ e.dodgeTimer-=dt; let perpX=-dz/dist, perpZ=dx/dist, nx=e.x+perpX*e.dodgeDir*s*2.5, nz=e.z+perpZ*e.dodgeDir*s*2.5; if(!isWallAt(nx,e.z,0.3)) e.x=nx; if(!isWallAt(e.x,nz,0.3)) e.z=nz; }
                        else if(dist<6 && Math.random()<0.03){ e.dodgeTimer=0.2+Math.random()*0.4; e.dodgeDir=Math.random()>0.5?1:-1; e.rushTimer=0.5; }
                        let spd=s*(e.rushTimer>0?1.8:1.0); if(e.rushTimer>0) e.rushTimer-=dt;
                        let nx=e.x+(dx/dist)*spd, nz=e.z+(dz/dist)*spd;
                        if(!isWallAt(nx,e.z,0.3)) e.x=nx; if(!isWallAt(e.x,nz,0.3)) e.z=nz;
                    } else if(dist>=ENEMY_CHASE_DIST){
                        e.wanderTimer-=dt; if(e.wanderTimer<=0){ e.wanderAngle+=(Math.random()-0.5)*1.0; e.wanderTimer=2+Math.random()*3; }
                        let ws=1.5*dt, nx=e.x+Math.sin(e.wanderAngle)*ws, nz=e.z+Math.cos(e.wanderAngle)*ws;
                        if(!isWallAt(nx,e.z,0.3)) e.x=nx; if(!isWallAt(e.x,nz,0.3)) e.z=nz;
                    }
                    if(dist<0.8){ player.health-=30*dt; screenShake=Math.max(screenShake,0.05); }
                }
                if(player.health<0) player.health=0;
            }

            function updatePlayer(dt){
                if(gameState!=='playing') return;
                player.angle += mouseDX*0.004; mouseDX=0;
                gunRecoil=Math.max(0, gunRecoil-dt*8); gunFlash=Math.max(0, gunFlash-dt*4); shootCooldown=Math.max(0, shootCooldown-dt); screenShake=Math.max(0, screenShake-dt);
                let fx=Math.sin(player.angle), fz=-Math.cos(player.angle), rx=Math.cos(player.angle), rz=Math.sin(player.angle);
                let mx=0,mz=0;
                if(input.forward){ mx+=fx; mz+=fz; } if(input.backward){ mx-=fx; mz-=fz; }
                if(input.left){ mx-=rx; mz-=rz; } if(input.right){ mx+=rx; mz+=rz; }
                let len=Math.hypot(mx,mz); if(len>0){ mx=mx/len*PLAYER_SPEED*dt; mz=mz/len*PLAYER_SPEED*dt; }
                if(!isWallAt(player.x+mx, player.z+mz,0.3)){ player.x+=mx; player.z+=mz; }
                else if(!isWallAt(player.x+mx, player.z,0.3)) player.x+=mx;
                else if(!isWallAt(player.x, player.z+mz,0.3)) player.z+=mz;

                if((input.shoot||touchShooting) && shootCooldown<=0){
                    if(currentWeapon.fullAuto || (!currentWeapon.fullAuto && input.shoot)){
                        if(!currentWeapon.fullAuto && input.shoot) input.shoot=false;
                        shoot();
                    }
                }
                for(let i=bulletHoles.length-1; i>=0; i--){ bulletHoles[i].life--; if(bulletHoles[i].life<=0) bulletHoles.splice(i,1); }
                updateEnemies(dt);
                pickupItems();

                // 同步自身状态
                if(isMultiplayer){
                    supabase.from('players').upsert({
                        id: roomId+'_'+myUserId, room_id: roomId, user_id: myUserId,
                        x: player.x, z: player.z, angle: player.angle,
                        health: player.health, score: player.score,
                        weapon: currentWeapon.name, ammo: currentWeapon.ammo,
                        is_alive: player.health>0, last_update: new Date().toISOString()
                    }, {onConflict:'id'});
                }
            }

            function drawGunHUD(){
                let hpW=200,hpH=16,hpX=10,hpY=H-30;
                let gunIconX=hpX+hpW+20,gunIconY=hpY-8,iconSize=44;
                let ox=0,oy=0; if(gunRecoil>0.1){ ox=(Math.random()-0.5)*gunRecoil*15; oy=-gunRecoil*22; }
                ctx.save(); ctx.translate(gunIconX+iconSize/2+ox, gunIconY+iconSize/2+oy);
                ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(-iconSize/2-2,-iconSize/2-2,iconSize+4,iconSize+4);
                ctx.fillStyle='#aaa';
                if(currentWeapon.name==='手枪'){ ctx.fillRect(-8,2,20,4); ctx.fillRect(4,-6,4,14); }
                else if(currentWeapon.name==='AK-47'){ ctx.fillStyle='#8b4513'; ctx.fillRect(-10,2,24,6); ctx.fillStyle='#5c2e0b'; ctx.fillRect(-12,-4,8,10); }
                else if(currentWeapon.name==='AUG'){ ctx.fillStyle='#4a4'; ctx.fillRect(-10,2,24,4); ctx.fillStyle='#2a2'; ctx.fillRect(-12,-2,10,8); }
                else if(currentWeapon.name==='霰弹枪'){ ctx.fillStyle='#5a3a1a'; ctx.fillRect(-10,2,24,4); ctx.fillStyle='#3a1a0a'; ctx.fillRect(-14,-4,12,8); }
                if(gunFlash>0){ ctx.fillStyle=`rgba(255,255,200,${gunFlash*5})`; ctx.fillRect(-22,-22,44,44); }
                ctx.restore();
                ctx.fillStyle='#fff'; ctx.font='bold 11px system-ui'; ctx.fillText(currentWeapon.name, gunIconX, gunIconY-12);
                if(currentWeapon.ammo!==Infinity) ctx.fillText(`${currentWeapon.ammo}/${currentWeapon.maxAmmo}`, gunIconX, gunIconY+iconSize+14);
                else ctx.fillText('∞', gunIconX, gunIconY+iconSize+14);
            }

            function render(){
                if(gameState!=='playing'){ ctx.clearRect(0,0,W,H); return; }
                let sx=0,sy=0; if(screenShake>0){ sx=(Math.random()-0.5)*screenShake*50; sy=(Math.random()-0.5)*screenShake*50; }
                ctx.clearRect(0,0,W,H);
                let gs=ctx.createLinearGradient(0,0,0,H); gs.addColorStop(0,'#0a0a1e'); gs.addColorStop(0.4,'#1a2a3a'); gs.addColorStop(1,'#0a0a0a'); ctx.fillStyle=gs; ctx.fillRect(0,0,W,H);
                let fog=ctx.createLinearGradient(0,centerY*0.7,0,H); fog.addColorStop(0,'rgba(10,10,20,0)'); fog.addColorStop(0.3,'rgba(10,10,20,0.3)'); fog.addColorStop(1,'rgba(5,5,10,0.7)'); ctx.fillStyle=fog; ctx.fillRect(0,centerY*0.7,W,H);
                ctx.save(); ctx.translate(sx,sy);
                let visible=[];
                for(let w of walls){ let dx=(w.x1+w.x2)/2-player.x,dz=(w.z1+w.z2)/2-player.z,s=Math.sin(player.angle),c=Math.cos(player.angle); let camZ=dx*s-dz*c; if(camZ<=0.05)continue; let minZ=Math.min((w.x1-player.x)*s-(w.z1-player.z)*c,(w.x2-player.x)*s-(w.z2-player.z)*c); visible.push({type:'wall',w,z:minZ}); }
                for(let e of enemies){ if(!e.alive&&e.deadTimer<=0)continue; let dx=e.x-player.x,dz=e.z-player.z,camZ=dx*Math.sin(player.angle)-dz*Math.cos(player.angle); if(camZ<=0.1)continue; visible.push({type:'enemy',e,z:camZ}); }
                for(let h of healthPacks){ if(!h.alive)continue; let dx=h.x-player.x,dz=h.z-player.z,camZ=dx*Math.sin(player.angle)-dz*Math.cos(player.angle); if(camZ<=0.1)continue; visible.push({type:'health',h,z:camZ}); }
                for(let p of weaponPickups){ if(!p.alive)continue; let dx=p.x-player.x,dz=p.z-player.z,camZ=dx*Math.sin(player.angle)-dz*Math.cos(player.angle); if(camZ<=0.1)continue; visible.push({type:'weapon',p,z:camZ}); }
                for(let a of ammoPacks){ if(!a.alive)continue; let dx=a.x-player.x,dz=a.z-player.z,camZ=dx*Math.sin(player.angle)-dz*Math.cos(player.angle); if(camZ<=0.1)continue; visible.push({type:'ammo',a,z:camZ}); }
                for(let [id,data] of remotePlayers){ if(!data.is_alive)continue; let dx=data.x-player.x,dz=data.z-player.z,camZ=dx*Math.sin(player.angle)-dz*Math.cos(player.angle); if(camZ>0.1) visible.push({type:'remote',id,data,z:camZ}); }
                visible.sort((a,b)=>b.z-a.z);
                for(let v of visible){
                    if(v.type==='wall') drawWall({x:v.w.x1,z:v.w.z1},{x:v.w.x2,z:v.w.z2},v.w.h,v.w.color,Math.max(0.25,1.0-v.z/80));
                    else if(v.type==='enemy') drawEnemy(v.e);
                    else if(v.type==='health') drawHealthPack(v.h);
                    else if(v.type==='weapon') drawWeaponPickup(v.p);
                    else if(v.type==='ammo') drawAmmoPack(v.a);
                    else if(v.type==='remote') drawRemotePlayer(v.id,v.data);
                }
                for(let bh of bulletHoles){ let p=project(bh.x,1.0,bh.z); if(p&&p.x>0&&p.x<W&&p.y>0&&p.y<H){ ctx.fillStyle='#111';ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill(); ctx.fillStyle='#333';ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);ctx.fill(); } }
                ctx.restore();

                // HUD
                let hpW=200,hpH=16,hpX=10,hpY=H-30;
                ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(hpX-1,hpY-1,hpW+2,hpH+2);
                ctx.fillStyle='#600';ctx.fillRect(hpX,hpY,hpW,hpH);
                let hpPct=player.health/100; ctx.fillStyle=hpPct>0.5?'#0f0':hpPct>0.25?'#ff0':'#f00'; ctx.fillRect(hpX,hpY,hpW*hpPct,hpH);
                ctx.fillStyle='#fff';ctx.font='bold 11px system-ui'; ctx.fillText('HP: '+Math.ceil(player.health),hpX+4,hpY+11); ctx.fillText('分数: '+player.score,hpX+4,hpY-6);
                drawGunHUD();
                ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1;
                ctx.beginPath();ctx.moveTo(centerX-10,centerY);ctx.lineTo(centerX-4,centerY);ctx.stroke();
                ctx.beginPath();ctx.moveTo(centerX+4,centerY);ctx.lineTo(centerX+10,centerY);ctx.stroke();
                ctx.beginPath();ctx.moveTo(centerX,centerY-10);ctx.lineTo(centerX,centerY-4);ctx.stroke();
                ctx.beginPath();ctx.moveTo(centerX,centerY+4);ctx.lineTo(centerX,centerY+10);ctx.stroke();
                ctx.beginPath();ctx.arc(centerX,centerY,12,0,Math.PI*2);ctx.stroke();
                let mmW=80,mmH=80,mmX=W-mmW-10,mmY=10;
                ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(mmX,mmY,mmW,mmH);
                let scale=mmW/MAP_SIZE; ctx.fillStyle='#444';
                for(let x=0;x<MAP_SIZE;x+=4) for(let z=0;z<MAP_SIZE;z+=4) if(map[x]?.[z]===1) ctx.fillRect(mmX+x*scale,mmY+z*scale,scale*4,scale*4);
                ctx.fillStyle='#0f0';ctx.fillRect(mmX+player.x*scale-2,mmY+player.z*scale-2,4,4);
                ctx.fillStyle='#f00'; enemies.filter(e=>e.alive).forEach(e=>ctx.fillRect(mmX+e.x*scale-1,mmY+e.z*scale-1,2,2));
                if(player.health<=0){
                    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H); ctx.fillStyle='#f00';ctx.font='bold 36px system-ui';ctx.textAlign='center'; ctx.fillText('💀 你死了',centerX,centerY-20);
                    ctx.fillStyle='#fff';ctx.font='16px system-ui'; ctx.fillText('得分: '+player.score,centerX,centerY+20);
                    if(isMultiplayer) ctx.fillText('按 R 重生', centerX, centerY+50);
                    let btnX=centerX-80,btnY=centerY+80,btnW=160,btnH=40; ctx.fillStyle='#4a6a9a';ctx.fillRect(btnX,btnY,btnW,btnH); ctx.fillStyle='#fff';ctx.fillText('返回主菜单',centerX,btnY+27);
                    canvas.style.cursor='pointer'; canvas.onclick=function(e){ let rect=canvas.getBoundingClientRect(); let cx=(e.clientX-rect.left)*(canvas.width/rect.width),cy=(e.clientY-rect.top)*(canvas.height/rect.height); if(cx>btnX&&cx<btnX+btnW&&cy>btnY&&cy<btnY+btnH) returnToMenu(); };
                } else { canvas.style.cursor='none'; canvas.onclick=null; }
            }

            function returnToMenu(){
                if(isMultiplayer){
                    supabase.from('players').delete().eq('id', roomId+'_'+myUserId);
                    if(isHost) supabase.from('rooms').update({state:'over'}).eq('id', roomId);
                    subscriptions.forEach(s=>s.unsubscribe()); subscriptions=[];
                }
                gameState='menu'; isMultiplayer=false; isHost=false; roomId=null;
                mainMenu.classList.remove('hidden'); roomPanel.style.display='none';
                document.exitPointerLock();
                player.health=100; player.score=0; enemies=[]; healthPacks=[]; weaponPickups=[]; ammoPacks=[]; bulletHoles=[];
                currentWeapon={...weapons.pistol, ammo:weapons.pistol.maxAmmo};
                remotePlayers.clear();
            }

            function startSoloGame(){
                mainMenu.classList.add('hidden'); gameState='playing'; isMultiplayer=false; isHost=false;
                initAudio();
                generateLocalMap(gameSettings);
                canvas.requestPointerLock();
            }

            async function createRoom(){
                roomId=Math.random().toString(36).substr(2,6).toUpperCase(); isHost=true; isMultiplayer=true;
                await supabase.from('rooms').insert({id:roomId, host_id:myUserId, state:'lobby'});
                roomStatus.innerHTML=`房间码: ${roomId} ，等待玩家加入...<br>`;
                document.getElementById('roomCreateSection').style.display='none';
                document.getElementById('roomJoinSection').style.display='none';
                let ch=supabase.channel(`room-${roomId}`).on('postgres_changes',{event:'INSERT',schema:'public',table:'players',filter:`room_id=eq.${roomId}`},(payload)=>{
                    if(payload.new.user_id!==myUserId) roomStatus.innerHTML+=`玩家 ${payload.new.user_id.substr(0,4)} 已加入<br>`;
                }).subscribe();
                subscriptions.push(ch);
                let startBtn=document.createElement('button'); startBtn.innerText='开始游戏';
                startBtn.onclick=async ()=>{
                    // 应用当前设置
                    saveUISettings();
                    await supabase.from('rooms').update({state:'playing', map_seed: gameSettings}).eq('id', roomId);
                    await startMultiplayerGameAsHost();
                };
                roomStatus.appendChild(startBtn);
            }

            async function joinRoom(){
                let code=roomCodeInput.value.trim().toUpperCase(); if(!code) return;
                let {data:roomData}=await supabase.from('rooms').select('*').eq('id',code).single();
                if(!roomData||roomData.state!=='lobby'){ alert('房间不存在或已开始游戏'); return; }
                roomId=code; isHost=false; isMultiplayer=true;
                // 获取种子设置
                if(roomData.map_seed) gameSettings = roomData.map_seed;
                await supabase.from('players').insert({id:roomId+'_'+myUserId, room_id:roomId, user_id:myUserId});
                roomStatus.innerText=`已加入房间 ${roomId} ，等待房主开始...`;
                document.getElementById('roomCreateSection').style.display='none';
                document.getElementById('roomJoinSection').style.display='none';
                let ch=supabase.channel(`room-${roomId}`).on('postgres_changes',{event:'UPDATE',schema:'public',table:'rooms',filter:`id=eq.${roomId}`},async(payload)=>{
                    if(payload.new.state==='playing'){
                        // 使用房主上传的设置和地图
                        if(payload.new.map_seed) gameSettings = payload.new.map_seed;
                        await startMultiplayerGameAsClient(payload.new.map_data);
                    }
                }).subscribe();
                subscriptions.push(ch);
            }

            async function startMultiplayerGameAsHost(){
                mainMenu.classList.add('hidden'); roomPanel.style.display='none';
                gameState='playing';
                generateLocalMap(gameSettings);
                let wallsData = walls.map(w=>({x1:w.x1,z1:w.z1,x2:w.x2,z2:w.z2,color:w.color}));
                await supabase.from('rooms').update({map_data:{map, MAP_SIZE, walls:wallsData}}).eq('id', roomId);
                // 上传敌人物品
                await supabase.from('enemies').delete().eq('room_id', roomId);
                await supabase.from('pickups').delete().eq('room_id', roomId);
                if(gameSettings.ENABLE_ENEMIES){
                    for(let i=0; i<enemies.length; i++){
                        let e=enemies[i];
                        await supabase.from('enemies').insert({room_id:roomId, enemy_index:i, x:e.x, z:e.z, hp:e.hp, max_hp:e.maxHp, alive:e.alive});
                    }
                }
                for(let i=0; i<healthPacks.length; i++) await supabase.from('pickups').insert({room_id:roomId, pickup_index:i, type:'health', x:healthPacks[i].x, z:healthPacks[i].z, alive:true});
                for(let i=0; i<weaponPickups.length; i++) await supabase.from('pickups').insert({room_id:roomId, pickup_index:i+1000, type:weaponPickups[i].type, x:weaponPickups[i].x, z:weaponPickups[i].z, alive:true});
                for(let i=0; i<ammoPacks.length; i++) await supabase.from('pickups').insert({room_id:roomId, pickup_index:i+2000, type:'ammo', x:ammoPacks[i].x, z:ammoPacks[i].z, alive:true});

                let syncInterval = setInterval(async ()=>{
                    if(gameState!=='playing' || !isHost){ clearInterval(syncInterval); return; }
                    if(gameSettings.ENABLE_ENEMIES){
                        for(let i=0; i<enemies.length; i++){
                            let e=enemies[i];
                            await supabase.from('enemies').update({x:e.x,z:e.z,hp:e.hp,alive:e.alive,dead_timer:e.deadTimer}).eq('room_id',roomId).eq('enemy_index',i);
                        }
                    }
                    for(let i=0; i<healthPacks.length; i++) await supabase.from('pickups').update({alive:healthPacks[i].alive}).eq('room_id',roomId).eq('pickup_index',i);
                    for(let i=0; i<weaponPickups.length; i++) await supabase.from('pickups').update({alive:weaponPickups[i].alive}).eq('room_id',roomId).eq('pickup_index',i+1000);
                    for(let i=0; i<ammoPacks.length; i++) await supabase.from('pickups').update({alive:ammoPacks[i].alive}).eq('room_id',roomId).eq('pickup_index',i+2000);
                }, 200);

                let evCh = supabase.channel(`events-${roomId}`).on('postgres_changes',{event:'INSERT',schema:'public',table:'events',filter:`room_id=eq.${roomId}`},async(payload)=>{
                    let event=payload.new;
                    if(event.sender_id===myUserId) return;
                    if(event.type==='shoot_hit'){
                        let idx=event.data.enemy_index;
                        if(enemies[idx] && enemies[idx].alive){
                            enemies[idx].hp--;
                            if(enemies[idx].hp<=0){ enemies[idx].alive=false; enemies[idx].deadTimer=1.5; }
                        }
                    } else if(event.type==='pickup'){
                        let pickupIndex=event.data.pickup_index;
                        if(pickupIndex<1000) healthPacks[pickupIndex].alive=false;
                        else if(pickupIndex<2000) weaponPickups[pickupIndex-1000].alive=false;
                        else ammoPacks[pickupIndex-2000].alive=false;
                        await supabase.from('players').update({weapon:event.data.pickup_type, ammo:event.data.pickup_type==='health'?undefined:currentWeapon.ammo}).eq('user_id',event.sender_id);
                    } else if(event.type==='player_death'){
                        await supabase.from('players').update({is_alive:false}).eq('user_id',event.sender_id);
                    }
                }).subscribe();
                subscriptions.push(evCh);
                canvas.requestPointerLock();
            }

            async function startMultiplayerGameAsClient(mapData){
                mainMenu.classList.add('hidden'); roomPanel.style.display='none';
                gameState='playing';
                map = mapData.map; MAP_SIZE = map.length;
                walls = mapData.walls.map(w=>({x1:w.x1,z1:w.z1,x2:w.x2,z2:w.z2,h:WALL_HEIGHT,color:w.color}));
                player.x = mapData.rooms?.[0]?.cx || 10; player.z = mapData.rooms?.[0]?.cz || 10;
                enemies=[]; healthPacks=[]; weaponPickups=[]; ammoPacks=[];

                let {data:enemyData} = await supabase.from('enemies').select('*').eq('room_id', roomId);
                if(enemyData) enemyData.forEach(e=>{ enemies[e.enemy_index] = {x:e.x,z:e.z,hp:e.hp,maxHp:e.max_hp,alive:e.alive,deadTimer:e.dead_timer||0,dodgeTimer:0,dodgeDir:0,rushTimer:0,wanderAngle:0,wanderTimer:1}; });
                let {data:pickupData} = await supabase.from('pickups').select('*').eq('room_id', roomId);
                if(pickupData) pickupData.forEach(p=>{
                    if(p.pickup_index<1000) healthPacks[p.pickup_index]={x:p.x,z:p.z,alive:p.alive};
                    else if(p.pickup_index<2000) weaponPickups[p.pickup_index-1000]={x:p.x,z:p.z,type:p.type,alive:p.alive};
                    else ammoPacks[p.pickup_index-2000]={x:p.x,z:p.z,alive:p.alive};
                });

                let enemyCh = supabase.channel(`enemies-${roomId}`).on('postgres_changes',{event:'UPDATE',schema:'public',table:'enemies',filter:`room_id=eq.${roomId}`},(payload)=>{
                    let idx=payload.new.enemy_index;
                    if(!enemies[idx]) enemies[idx]={};
                    Object.assign(enemies[idx],{x:payload.new.x,z:payload.new.z,hp:payload.new.hp,maxHp:payload.new.max_hp,alive:payload.new.alive,deadTimer:payload.new.dead_timer||0});
                }).subscribe();
                subscriptions.push(enemyCh);
                let pickupCh = supabase.channel(`pickups-${roomId}`).on('postgres_changes',{event:'UPDATE',schema:'public',table:'pickups',filter:`room_id=eq.${roomId}`},(payload)=>{
                    let idx=payload.new.pickup_index;
                    if(idx<1000 && healthPacks[idx]) healthPacks[idx].alive=payload.new.alive;
                    else if(idx<2000 && weaponPickups[idx-1000]) weaponPickups[idx-1000].alive=payload.new.alive;
                    else if(idx>=2000 && ammoPacks[idx-2000]) ammoPacks[idx-2000].alive=payload.new.alive;
                }).subscribe();
                subscriptions.push(pickupCh);
                let playerCh = supabase.channel(`players-${roomId}`).on('postgres_changes',{event:'*',schema:'public',table:'players',filter:`room_id=eq.${roomId}`},(payload)=>{
                    if(payload.new.user_id !== myUserId){
                        remotePlayers.set(payload.new.user_id, payload.new);
                    } else {
                        if(payload.new.is_alive===false) player.health=0;
                        if(payload.new.weapon && currentWeapon.name!==payload.new.weapon){
                            let w = weapons[payload.new.weapon==='手枪'?'pistol':payload.new.weapon==='AK-47'?'ak47':payload.new.weapon==='AUG'?'aug':payload.new.weapon==='霰弹枪'?'shotgun':null];
                            if(w) currentWeapon={...w, ammo:payload.new.ammo||w.maxAmmo};
                        }
                    }
                }).subscribe();
                subscriptions.push(playerCh);
                canvas.requestPointerLock();
            }

            // 重生（仅联机）
            window.addEventListener('keydown', (e) => {
                if(e.key.toLowerCase() === 'r' && isMultiplayer && player.health <= 0 && gameState==='playing'){
                    // 随机出生点
                    let attempts=100;
                    while(attempts--){
                        let rx = 5 + Math.random()*(MAP_SIZE-10), rz = 5 + Math.random()*(MAP_SIZE-10);
                        if(!isWallAt(rx, rz, 0.5)){
                            player.x = rx; player.z = rz; player.health = 100;
                            supabase.from('players').update({x:rx, z:rz, health:100, is_alive:true}).eq('id', roomId+'_'+myUserId);
                            break;
                        }
                    }
                }
            });

            // 按钮事件
            document.getElementById('btnSolo').addEventListener('click', startSoloGame);
            document.getElementById('btnMultiplayer').addEventListener('click', ()=>{
                roomPanel.style.display='flex';
                document.getElementById('roomCreateSection').style.display='block';
                document.getElementById('roomJoinSection').style.display='block';
                roomStatus.innerText=''; roomTitle.innerText='联机房间';
            });
            document.getElementById('btnCreateRoom').addEventListener('click', createRoom);
            document.getElementById('btnJoinRoom').addEventListener('click', joinRoom);
            document.getElementById('btnBackToMenu').addEventListener('click', ()=>{ roomPanel.style.display='none'; returnToMenu(); });
            document.getElementById('btnSettings').addEventListener('click', ()=>{ syncUISettings(); document.getElementById('settingsPanel').style.display='flex'; });

            // 输入处理
            window.addEventListener('keydown',(e)=>{
                if(e.key.toLowerCase()==='escape' && gameState==='playing') returnToMenu();
                switch(e.key.toLowerCase()){
                    case 'w': input.forward=true; e.preventDefault(); break;
                    case 's': input.backward=true; e.preventDefault(); break;
                    case 'a': input.left=true; e.preventDefault(); break;
                    case 'd': input.right=true; e.preventDefault(); break;
                }
            });
            window.addEventListener('keyup',(e)=>{
                switch(e.key.toLowerCase()){
                    case 'w': input.forward=false; e.preventDefault(); break;
                    case 's': input.backward=false; e.preventDefault(); break;
                    case 'a': input.left=false; e.preventDefault(); break;
                    case 'd': input.right=false; e.preventDefault(); break;
                }
            });
            canvas.addEventListener('click', ()=>{ if(gameState==='playing' && document.pointerLockElement!==canvas) canvas.requestPointerLock(); });
            document.addEventListener('pointerlockchange', ()=>{ document.querySelector('.hint').style.display = document.pointerLockElement===canvas?'none':'block'; });
            document.addEventListener('mousemove', (e)=>{ if(document.pointerLockElement===canvas) mouseDX += e.movementX; });
            canvas.addEventListener('mousedown', (e)=>{ if(e.button===0) input.shoot=true; });
            canvas.addEventListener('mouseup', (e)=>{ if(e.button===0) input.shoot=false; });

            let lastTime=performance.now();
            function gameLoop(now){
                let dt = Math.min((now-lastTime)/1000, 0.1); lastTime = now;
                if(player.health>0 && gameState==='playing') updatePlayer(dt);
                render(); requestAnimationFrame(gameLoop);
            }
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>

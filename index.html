<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Small 3 的聊天室</title>
  <style>
    :root{--bg:#1a1a2e;--msg:#16213e;--text:#e0e0e0;--accent:#60a5fa;--accent2:#3b82f6;--my-msg:#1a3a2a;--other-msg:#16213e;--input-bg:#0f1724;--sidebar-bg:rgba(0,0,0,0.7);--border:rgba(255,255,255,0.1);--radius:12px;}
    body.light{--bg:#f0f0f0;--msg:#ffffff;--text:#333;--my-msg:#e3f2fd;--other-msg:#ffffff;--input-bg:#e8e8e8;--sidebar-bg:rgba(255,255,255,0.9);--border:rgba(0,0,0,0.1);}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;height:100vh;display:flex;overflow:hidden;transition:all .3s}
    
    .sidebar-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99;display:none}
    .sidebar-overlay.show{display:block}
    
    .sidebar{position:fixed;top:0;left:-300px;width:280px;height:100%;background:var(--sidebar-bg);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);z-index:100;transition:left .3s;display:flex;flex-direction:column;padding:20px 16px;border-right:1px solid var(--border)}
    .sidebar.open{left:0}
    .sidebar-close{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer}
    .sidebar-header{text-align:center;margin-bottom:20px}
    .sidebar-header img{width:60px;height:60px;border-radius:50%;border:3px solid var(--accent);object-fit:cover}
    .sidebar-header h3{margin-top:8px;font-size:16px;color:var(--accent)}
    .sidebar-btn{display:block;width:100%;padding:12px;margin:6px 0;background:rgba(96,165,250,0.1);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:14px;text-align:left;transition:all .2s}
    .sidebar-btn:hover{background:rgba(96,165,250,0.2);border-color:var(--accent)}
    .sidebar-btn.danger{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3)}
    .sidebar-btn.danger:hover{background:rgba(239,68,68,0.2)}
    
    .main{flex:1;display:flex;flex-direction:column;height:100%;position:relative}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);z-index:10}
    .topbar h2{font-size:18px;font-weight:600;color:var(--accent)}
    .topbar .status{font-size:12px;color:var(--text);opacity:0.7}
    .topbar .gear-btn{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;opacity:0.7}
    .topbar .gear-btn:hover{opacity:1}
    
    .chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
    .msg-row{display:flex;flex-direction:column;max-width:85%;align-self:flex-start}
    .msg-row.mine{align-self:flex-start}
    .msg-user{font-size:12px;font-weight:600;margin-bottom:2px}
    .msg-user span{background:var(--accent);color:#fff;padding:2px 10px;border-radius:10px;font-size:11px}
    .msg-bubble{background:var(--other-msg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;word-break:break-word;line-height:1.5;font-size:14px}
    .msg-row.mine .msg-bubble{background:var(--my-msg);border-color:rgba(96,165,250,0.3)}
    .msg-time{font-size:10px;opacity:0.5;margin-top:4px}
    .msg-attachment{margin-top:8px}
    .msg-attachment img{max-width:200px;max-height:200px;border-radius:8px;cursor:pointer;display:block}
    .msg-attachment a{color:var(--accent);font-size:12px;text-decoration:none}
    
    .input-area{display:flex;gap:8px;padding:12px 16px;background:var(--bg);border-top:1px solid var(--border);align-items:flex-end}
    .input-area textarea{flex:1;padding:10px 14px;border-radius:20px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;resize:none;outline:none;max-height:100px;min-height:18px;font-family:inherit;line-height:1.4}
    .input-area textarea:focus{border-color:var(--accent)}
    .input-area button{padding:8px 16px;border-radius:20px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:14px;white-space:nowrap;transition:all .2s}
    .input-area button:hover{background:var(--accent2);transform:translateY(-1px)}
    .input-area .attach-btn{background:rgba(96,165,250,0.2);padding:8px 12px}
    .input-area .attach-btn:hover{background:rgba(96,165,250,0.3)}
    
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:center;justify-content:center}
    .modal{background:var(--sidebar-bg);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border-radius:16px;padding:28px;border:1px solid var(--border);max-width:400px;width:90%;animation:pop .3s ease}
    @keyframes pop{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
    .modal h3{font-size:18px;color:var(--accent);margin-bottom:16px;text-align:center}
    .modal input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;outline:none;margin-bottom:10px}
    .modal input:focus{border-color:var(--accent)}
    .modal .btn-group{display:flex;gap:8px;margin-top:16px}
    .modal .btn-group button{flex:1;padding:10px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
    .modal .btn-primary{background:var(--accent);color:#fff}
    .modal .btn-secondary{background:rgba(96,165,250,0.2);color:var(--text);border:1px solid var(--border)}
    
    .log-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center}
    .log-box{background:var(--sidebar-bg);backdrop-filter:blur(15px);border-radius:16px;padding:20px;border:1px solid var(--border);max-width:500px;width:90%;max-height:60vh;overflow-y:auto;font-family:monospace;font-size:12px;color:var(--text);line-height:1.6}
    .log-box h3{color:var(--accent);margin-bottom:10px;font-family:inherit;font-size:16px}
    
    .admin-panel{display:none}
    .admin-panel.show{display:block;margin-top:10px}
    
    @media(max-width:600px){
      .msg-row{max-width:95%}
      .input-area{gap:4px;padding:8px}
      .input-area textarea{font-size:13px}
      .input-area button{padding:6px 12px;font-size:12px}
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  <div class="sidebar-header">
    <img src="https://i.mituw.com/imgs/2026/03/15/de4945abb96be550.jpg" alt="头像" onerror="this.style.display='none'">
    <h3>Small 3 的聊天室</h3>
  </div>
  <button class="sidebar-btn" onclick="showAdminModal()" id="adminModeBtn">🔐 管理员模式</button>
  <button class="sidebar-btn" onclick="toggleTheme()" id="themeBtn">🌙 夜间模式</button>
  <button class="sidebar-btn" onclick="showLog()">📋 运行日志</button>
  <button class="sidebar-btn danger" onclick="logout()">🚪 退出登录</button>
</div>

<div class="main" id="mainApp" style="display:none">
  <div class="topbar">
    <div><h2>Small 3 的聊天室</h2><div class="status" id="onlineStatus">在线</div></div>
    <button class="gear-btn" onclick="openSidebar()">⚙️</button>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <input type="file" id="attachInput" style="display:none" accept="*/*">
    <button class="attach-btn" onclick="document.getElementById('attachInput').click()" title="附件（<25MB）">📎</button>
    <textarea id="msgInput" rows="1" placeholder="输入消息...（禁止 __ 和 /）" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button onclick="sendMessage()">发送</button>
  </div>
</div>

<div id="authModal" class="modal-overlay">
  <div class="modal" id="authBox">
    <h3 id="authTitle">欢迎来到 Small 3 的聊天室</h3>
    <input type="text" id="authUser" placeholder="用户名">
    <input type="password" id="authPass" placeholder="密码">
    <div class="btn-group" id="authBtns">
      <button class="btn-primary" onclick="auth('login')">登录</button>
      <button class="btn-secondary" onclick="auth('register')">注册</button>
    </div>
  </div>
</div>

<div id="adminModal" class="modal-overlay" style="display:none">
  <div class="modal"><h3>🔐 管理员验证</h3>
    <input type="password" id="adminPass" placeholder="管理员密码">
    <div class="btn-group">
      <button class="btn-secondary" onclick="document.getElementById('adminModal').style.display='none'">取消</button>
      <button class="btn-primary" onclick="verifyAdmin()">验证</button>
    </div>
  </div>
</div>

<div id="logModal" class="log-modal" style="display:none">
  <div class="log-box"><h3>📋 运行日志</h3><div id="logContent">暂无日志</div><br><button class="sidebar-btn" onclick="clearLog()">清空日志</button></div>
</div>

<script>
// ═══════════ 配置 ═══════════
var ENC_TOKEN='59a643c206c92361b1fbd493f07065e64fff6a57cd90779631dae58a49c8457f0ca702ed01fb2a5b';
var ADMIN_HASH='0cd875127059c80ae5744c59a4e1183a123f4f9dea543f9391bcff9317f0b4f6';
var REPO_USER='small534460';var REPO_NAME='LTS';var MSG_DIR='messages';var USER_DIR='users';
var token='';var currentUser='';var pollingTimer=null;var logs=[];var theme='dark';var attachFile=null;

function addLog(m){var t=new Date().toLocaleTimeString();logs.push('['+t+'] '+m);console.log('[LOG]',m);if(logs.length>200)logs.shift()}

// ═══════════ 解密令牌 ═══════════
function decryptToken(pw){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw)).then(function(h){var hb=new Uint8Array(h),eb=[];for(var i=0;i<ENC_TOKEN.length;i+=2)eb.push(parseInt(ENC_TOKEN.substr(i,2),16));var db=[];for(var i=0;i<eb.length;i++)db.push(eb[i]^hb[i%hb.length]);return new TextDecoder().decode(new Uint8Array(db))})}

// ═══════════ API ═══════════
async function api(endpoint,method,data){method=method||'GET';data=data||null;if(!token&&endpoint.indexOf('users/')<0&&endpoint!=='contents/'+USER_DIR){try{token=await decryptToken('534460')}catch(e){}}var url='https://api.github.com/repos/'+REPO_USER+'/'+REPO_NAME+'/'+endpoint;var opts={method:method,headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}};if(data)opts.body=JSON.stringify(data);try{var r=await fetch(url,opts);if(r.status===204)return null;if(!r.ok){var errText=await r.text();throw new Error('API '+r.status+': '+errText.substring(0,100))}return await r.json()}catch(e){addLog('API错误: '+e.message);return null}}

// ═══════════ 运行日志 ═══════════
function showLog(){document.getElementById('logModal').style.display='flex';renderLog()}
function renderLog(){document.getElementById('logContent').innerHTML=logs.length?logs.join('<br>'):'暂无日志'}
function clearLog(){logs=[];renderLog();addLog('日志已清空')}
document.addEventListener('click',function(e){if(e.target.id==='logModal')document.getElementById('logModal').style.display='none'})

// ═══════════ 主题 ═══════════
function toggleTheme(){if(theme==='dark'){document.body.classList.add('light');theme='light';document.getElementById('themeBtn').textContent='☀️ 白天模式'}else{document.body.classList.remove('light');theme='dark';document.getElementById('themeBtn').textContent='🌙 夜间模式'}localStorage.setItem('chat_theme',theme)}

// ═══════════ 侧边栏 ═══════════
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show')}

// ═══════════ 管理员 ═══════════
async function verifyAdmin(){
  var pw=document.getElementById('adminPass').value;if(!pw)return;
  var hh=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw)).then(function(h){return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0')}).join('')});
  if(hh===ADMIN_HASH){addLog('管理员验证成功');document.getElementById('adminModal').style.display='none';showAdminPanel()}else{alert('密码错误')}
}
function showAdminModal(){document.getElementById('adminModal').style.display='flex';document.getElementById('adminPass').value=''}
function showAdminPanel(){if(confirm('管理员模式已激活。要删除聊天记录吗？')){if(confirm('确定删除所有聊天记录？不可恢复！')){deleteAllMessages()}}}
async function deleteAllMessages(){var list=await api('contents/'+MSG_DIR);if(list&&Array.isArray(list)){for(var i=0;i<list.length;i++){if(list[i].type==='dir'){try{var sub=await api('contents/'+MSG_DIR+'/'+list[i].name);if(sub&&Array.isArray(sub)){for(var j=0;j<sub.length;j++){if(sub[j].type==='file'){await api('contents/'+MSG_DIR+'/'+list[i].name+'/'+sub[j].name,'DELETE',{message:'删除',sha:sub[j].sha,branch:'main'})}}}await api('contents/'+MSG_DIR+'/'+list[i].name+'/.gitkeep?ref=main','DELETE',{message:'删除文件夹',sha:list[i].sha,branch:'main'}).catch(function(){})}catch(e){addLog('删除失败: '+e.message)}}}addLog('聊天记录已清空');loadMessages()}}

// ═══════════ 认证 ═══════════
async function auth(type){
  var u=document.getElementById('authUser').value.trim();var p=document.getElementById('authPass').value;if(!u||!p)return alert('填写完整');if(u.indexOf('/')>=0||u.indexOf('\\')>=0||u.indexOf('__')>=0)return alert('用户名包含非法字符');
  if(type==='register'){
    var check=await api('contents/'+USER_DIR+'/'+u+'.txt');if(check){return alert('用户名已存在')}
    var cont=p+'\n0';var r=await api('contents/'+USER_DIR+'/'+u+'.txt','PUT',{message:'注册 '+u,content:btoa(unescape(encodeURIComponent(cont))),branch:'main'});
    if(r){alert('注册成功！等待管理员审核。');addLog('新用户注册: '+u)}else{alert('注册失败')}
  }else{
    var info=await api('contents/'+USER_DIR+'/'+u+'.txt');if(!info||!info.content)return alert('用户不存在');
    var txt=atob(info.content.replace(/\s/g,''));var lines=txt.split('\n');if(lines[0]!==p)return alert('密码错误');if(lines[1]!=='1')return alert('账户待审核');
    currentUser=u;token='';try{token=await decryptToken('534460')}catch(e){}localStorage.setItem('chat_user',u);
    document.getElementById('authModal').style.display='none';document.getElementById('mainApp').style.display='flex';
    addLog('登录成功: '+u);loadMessages();pollingTimer=setInterval(loadMessages,2000);
  }
}
function logout(){clearInterval(pollingTimer);currentUser='';token='';localStorage.removeItem('chat_user');document.getElementById('authModal').style.display='flex';document.getElementById('mainApp').style.display='none';addLog('已退出')}

// ═══════════ 发送消息 ═══════════
async function sendMessage(){
  var msg=document.getElementById('msgInput').value.trim();if(!msg&&!attachFile)return;if(msg.indexOf('__')>=0||msg.indexOf('/')>=0||msg.indexOf('\\')>=0)return alert('消息含非法字符');
  var now=new Date();var ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+'-'+String(now.getMinutes()).padStart(2,'0')+'-'+String(now.getSeconds()).padStart(2,'0');
  var safeMsg=msg||'(图片)';var folderName=ts+'__'+currentUser+'__'+safeMsg;var folderPath=MSG_DIR+'/'+folderName;
  await api('contents/'+folderPath+'/.gitkeep','PUT',{message:'消息: '+currentUser,content:btoa('# 消息'),branch:'main'});
  if(attachFile){await uploadAttach(folderPath)}
  document.getElementById('msgInput').value='';attachFile=null;loadMessages();addLog('发送消息: '+safeMsg.substring(0,30))
}
async function uploadAttach(folderPath){
  var f=attachFile;if(f.size>25*1024*1024){alert('附件<25MB');return}
  var r=new FileReader();r.onload=async function(e){var c=btoa(new Uint8Array(e.target.result).reduce(function(d,b){return d+String.fromCharCode(b)},''));await api('contents/'+folderPath+'/'+f.name,'PUT',{message:'附件',content:c,branch:'main'});addLog('附件上传: '+f.name)};r.readAsArrayBuffer(f)
}
document.getElementById('attachInput').addEventListener('change',function(e){if(e.target.files.length>0){attachFile=e.target.files[0];addLog('已选择附件: '+attachFile.name+' ('+(attachFile.size/1024).toFixed(1)+'KB)')}});

// ═══════════ 加载消息 ═══════════
async function loadMessages(){
  if(!currentUser)return;var list=await api('contents/'+MSG_DIR);if(!list||!Array.isArray(list))return;
  var msgs=[];for(var i=0;i<list.length;i++){if(list[i].type==='dir'){var parts=list[i].name.split('__',3);if(parts.length>=3){msgs.push({folder:list[i],time:parts[0],user:parts[1],text:parts[2]})}}}
  msgs.sort(function(a,b){return a.time.localeCompare(b.time)});
  var area=document.getElementById('chatArea');area.innerHTML='';if(msgs.length===0){area.innerHTML='<div style="text-align:center;opacity:0.5;padding:40px">暂无消息，来发第一条吧</div>';return}
  for(var i=0;i<msgs.length;i++){var m=msgs[i];await renderMessage(area,m)}area.scrollTop=area.scrollHeight
}
async function renderMessage(area,m){
  var row=document.createElement('div');row.className='msg-row';if(m.user===currentUser)row.classList.add('mine');
  var userEl=document.createElement('div');userEl.className='msg-user';userEl.innerHTML='<span>'+m.user+'</span> '+m.time.replace('_',' ');
  var bubble=document.createElement('div');bubble.className='msg-bubble';bubble.textContent=m.text;
  row.appendChild(userEl);row.appendChild(bubble);
  // 附件
  try{var sub=await api('contents/'+MSG_DIR+'/'+m.folder.name);if(sub&&Array.isArray(sub)){for(var j=0;j<sub.length;j++){if(sub[j].name==='.gitkeep')continue;var attDiv=document.createElement('div');attDiv.className='msg-attachment';var ext=sub[j].name.split('.').pop().toLowerCase();if(['jpg','jpeg','png','gif','bmp','webp','svg'].indexOf(ext)>=0){var img=document.createElement('img');img.src=sub[j].download_url;img.onclick=function(){window.open(sub[j].download_url)};attDiv.appendChild(img)}else{var a=document.createElement('a');a.href=sub[j].download_url;a.textContent='📎 '+sub[j].name;a.download=sub[j].name;attDiv.appendChild(a)}bubble.appendChild(attDiv)}}}catch(e){}
  area.appendChild(row)
}

// ═══════════ 初始化 ═══════════
document.addEventListener('DOMContentLoaded',async function(){
  var savedTheme=localStorage.getItem('chat_theme')||'dark';theme=savedTheme;if(theme==='light'){document.body.classList.add('light');document.getElementById('themeBtn').textContent='☀️ 白天模式'}
  var savedUser=localStorage.getItem('chat_user');if(savedUser){currentUser=savedUser;document.getElementById('authModal').style.display='none';document.getElementById('mainApp').style.display='flex';try{token=await decryptToken('534460')}catch(e){}loadMessages();pollingTimer=setInterval(loadMessages,2000);addLog('自动登录: '+savedUser)}
  addLog('聊天室初始化完成')
});
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Small 3 的聊天室</title>
  <style>
    :root{--bg:#1a1a2e;--msg:#16213e;--text:#e0e0e0;--accent:#60a5fa;--accent2:#3b82f6;--my-msg:#1a3a2a;--other-msg:#16213e;--input-bg:#0f1724;--sidebar-bg:rgba(0,0,0,0.7);--border:rgba(255,255,255,0.1);--radius:12px;}
    body.light{--bg:#f0f0f0;--msg:#ffffff;--text:#333;--my-msg:#e3f2fd;--other-msg:#ffffff;--input-bg:#e8e8e8;--sidebar-bg:rgba(255,255,255,0.9);--border:rgba(0,0,0,0.1);}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;height:100vh;display:flex;overflow:hidden;transition:all .3s}
    
    .sidebar-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99;display:none}
    .sidebar-overlay.show{display:block}
    .sidebar{position:fixed;top:0;left:-300px;width:280px;height:100%;background:var(--sidebar-bg);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);z-index:100;transition:left .3s;display:flex;flex-direction:column;padding:20px 16px;border-right:1px solid var(--border)}
    .sidebar.open{left:0}
    .sidebar-close{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer}
    .sidebar-header{text-align:center;margin-bottom:20px}
    .sidebar-header img{width:60px;height:60px;border-radius:50%;border:3px solid var(--accent);object-fit:cover}
    .sidebar-header h3{margin-top:8px;font-size:16px;color:var(--accent)}
    .sidebar-btn{display:block;width:100%;padding:12px;margin:6px 0;background:rgba(96,165,250,0.1);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:14px;text-align:left;transition:all .2s}
    .sidebar-btn:hover{background:rgba(96,165,250,0.2);border-color:var(--accent)}
    .sidebar-btn.danger{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3)}
    .sidebar-btn.danger:hover{background:rgba(239,68,68,0.2)}
    
    .main{flex:1;display:flex;flex-direction:column;height:100%;position:relative}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);z-index:10}
    .topbar h2{font-size:18px;font-weight:600;color:var(--accent)}
    .topbar .gear-btn{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;opacity:0.7}
    .topbar .gear-btn:hover{opacity:1}
    
    .chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
    .msg-row{max-width:85%;align-self:flex-start;display:flex;flex-direction:column}
    .msg-row.mine{align-self:flex-start}
    .msg-user{font-size:12px;font-weight:600;margin-bottom:2px}
    .msg-user span{background:var(--accent);color:#fff;padding:2px 10px;border-radius:10px;font-size:11px}
    .msg-bubble{background:var(--other-msg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;word-break:break-word;line-height:1.5;font-size:14px}
    .msg-row.mine .msg-bubble{background:var(--my-msg);border-color:rgba(96,165,250,0.3)}
    .msg-time{font-size:10px;opacity:0.5;margin-top:4px}
    .msg-attachment{margin-top:8px}
    .msg-attachment img{max-width:200px;max-height:200px;border-radius:8px;cursor:pointer;display:block}
    .msg-attachment a{color:var(--accent);font-size:12px;text-decoration:none}
    
    .input-area{display:flex;gap:8px;padding:12px 16px;background:var(--bg);border-top:1px solid var(--border);align-items:flex-end}
    .input-area textarea{flex:1;padding:10px 14px;border-radius:20px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;resize:none;outline:none;max-height:100px;min-height:18px;font-family:inherit;line-height:1.4}
    .input-area textarea:focus{border-color:var(--accent)}
    .input-area button{padding:8px 16px;border-radius:20px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:14px;white-space:nowrap;transition:all .2s}
    .input-area button:hover{background:var(--accent2);transform:translateY(-1px)}
    .input-area .attach-btn{background:rgba(96,165,250,0.2);padding:8px 12px}
    
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:center;justify-content:center}
    .modal-box{background:var(--sidebar-bg);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border-radius:16px;padding:28px;border:1px solid var(--border);max-width:400px;width:90%;animation:pop .3s ease}
    @keyframes pop{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
    .modal-box h3{font-size:18px;color:var(--accent);margin-bottom:16px;text-align:center}
    .modal-box input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;outline:none;margin-bottom:10px}
    .modal-box input:focus{border-color:var(--accent)}
    .modal-box .btn-group{display:flex;gap:8px;margin-top:16px;justify-content:center}
    .modal-box .btn-group button{flex:1;padding:10px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-secondary{background:rgba(96,165,250,0.2);color:var(--text);border:1px solid var(--border)}
    .btn-warning{background:#f59e0b;color:#fff}
    
    .log-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center}
    .log-box{background:var(--sidebar-bg);backdrop-filter:blur(15px);border-radius:16px;padding:20px;border:1px solid var(--border);max-width:500px;width:90%;max-height:60vh;overflow-y:auto;font-family:monospace;font-size:12px;color:var(--text);line-height:1.6}
    .log-box h3{color:var(--accent);margin-bottom:10px;font-family:inherit;font-size:16px}
    
    .welcome-btns{display:flex;gap:16px;justify-content:center;margin-top:20px}
    .welcome-btns button{padding:14px 32px;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;border:none;transition:all .2s;color:#fff;min-width:120px}
    .welcome-btns .btn-login{background:var(--accent)}
    .welcome-btns .btn-register{background:rgba(96,165,250,0.3);border:2px solid var(--accent)}
    .welcome-btns button:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(96,165,250,0.3)}
    
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:400;animation:fadeOut 2s ease forwards;pointer-events:none}
    @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
    
    @media(max-width:600px){.msg-row{max-width:95%}.input-area{gap:4px;padding:8px}.input-area button{padding:6px 12px;font-size:12px}.welcome-btns button{padding:12px 24px;font-size:16px}}
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  <div class="sidebar-header"><img src="https://i.mituw.com/imgs/2026/03/15/de4945abb96be550.jpg" alt="头像"><h3>Small 3 的聊天室</h3></div>
  <button class="sidebar-btn" onclick="showAdminModal()">🔐 管理员模式</button>
  <button class="sidebar-btn" onclick="toggleTheme()" id="themeBtn">🌙 夜间模式</button>
  <button class="sidebar-btn" onclick="showLog()">📋 运行日志</button>
  <button class="sidebar-btn danger" onclick="logout()">🚪 退出登录</button>
</div>

<div class="main" id="mainApp" style="display:none">
  <div class="topbar"><div><h2>Small 3 的聊天室</h2></div><button class="gear-btn" onclick="openSidebar()">⚙️</button></div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <input type="file" id="attachInput" style="display:none" accept="*/*">
    <button class="attach-btn" onclick="document.getElementById('attachInput').click()" title="附件（<25MB）">📎</button>
    <textarea id="msgInput" rows="1" placeholder="输入消息...（禁止 __ / \）" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button onclick="sendMessage()">发送</button>
  </div>
</div>

<div id="welcomeModal" class="modal-overlay">
  <div class="modal-box"><h3>欢迎来到 Small 3 的聊天室</h3><div style="text-align:center;color:var(--text);opacity:0.7;margin-bottom:10px">选择一个操作</div>
    <div class="welcome-btns"><button class="btn-login" onclick="showLoginModal()">登录</button><button class="btn-register" onclick="showRegisterModal()">注册</button></div>
  </div>
</div>

<div id="loginModal" class="modal-overlay" style="display:none">
  <div class="modal-box"><h3>🔑 登录</h3>
    <input type="text" id="loginUser" placeholder="用户名" autocomplete="off">
    <input type="password" id="loginPass" placeholder="密码" autocomplete="off">
    <div class="btn-group"><button class="btn-secondary" onclick="closeModal('loginModal')">返回</button><button class="btn-primary" onclick="doLogin()">登录</button></div>
  </div>
</div>

<div id="registerModal" class="modal-overlay" style="display:none">
  <div class="modal-box"><h3>📝 注册</h3>
    <input type="text" id="regUser" placeholder="用户名（禁止 __ / \）" autocomplete="off">
    <input type="password" id="regPass" placeholder="密码" autocomplete="off">
    <div class="btn-group"><button class="btn-secondary" onclick="closeModal('registerModal')">返回</button><button class="btn-primary" onclick="doRegister()">注册</button></div>
  </div>
</div>

<div id="adminModal" class="modal-overlay" style="display:none">
  <div class="modal-box"><h3>🔐 管理员验证</h3>
    <input type="password" id="adminPass" placeholder="管理员密码" autocomplete="off">
    <div class="btn-group"><button class="btn-secondary" onclick="document.getElementById('adminModal').style.display='none'">取消</button><button class="btn-warning" onclick="verifyAdmin()">验证</button></div>
  </div>
</div>

<div id="logModal" class="log-modal" style="display:none">
  <div class="log-box"><h3>📋 运行日志</h3><div id="logContent">暂无日志</div><br><button class="sidebar-btn" onclick="clearLog()">清空日志</button><button class="sidebar-btn" style="margin-top:4px" onclick="document.getElementById('logModal').style.display='none'">关闭</button></div>
</div>

function addLog(m){var t=new Date().toLocaleTimeString();logs.push('['+t+'] '+m);console.log(m);if(logs.length>200)logs.shift()}

function closeModal(id){document.getElementById(id).style.display='none'}

function decryptToken(pw){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw)).then(function(h){var hb=new Uint8Array(h),eb=[];for(var i=0;i<ENC_TOKEN.length;i+=2)eb.push(parseInt(ENC_TOKEN.substr(i,2),16));var db=[];for(var i=0;i<eb.length;i++)db.push(eb[i]^hb[i%hb.length]);return new TextDecoder().decode(new Uint8Array(db))})}

async function initToken(){try{token=await decryptToken('534460');addLog('令牌已解密')}catch(e){addLog('令牌解密失败: '+e.message)}}

async function api(endpoint,method,data){method=method||'GET';data=data||null;if(!token){try{await initToken()}catch(e){}if(!token){addLog('无令牌可用');return null}}var url='https://api.github.com/repos/'+REPO_USER+'/'+REPO_NAME+'/'+endpoint;var opts={method:method,headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}};if(data)opts.body=JSON.stringify(data);try{var r=await fetch(url,opts);if(r.status===204)return null;if(!r.ok){var t=await r.text();throw new Error('HTTP '+r.status+' '+t.substring(0,80))}if(r.status===200||r.status===201)return await r.json();return null}catch(e){addLog('API: '+e.message);return null}}

function showLog(){document.getElementById('logModal').style.display='flex';renderLog()}
function renderLog(){document.getElementById('logContent').innerHTML=logs.length?logs.join('<br>'):'暂无日志'}
function clearLog(){logs=[];renderLog();addLog('日志已清空')}

function toggleTheme(){if(theme==='dark'){document.body.classList.add('light');theme='light';document.getElementById('themeBtn').textContent='☀️ 白天模式'}else{document.body.classList.remove('light');theme='dark';document.getElementById('themeBtn').textContent='🌙 夜间模式'}localStorage.setItem('chat_theme',theme)}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show')}

function showLoginModal(){document.getElementById('welcomeModal').style.display='none';document.getElementById('loginModal').style.display='flex';document.getElementById('loginUser').value='';document.getElementById('loginPass').value=''}
function showRegisterModal(){document.getElementById('welcomeModal').style.display='none';document.getElementById('registerModal').style.display='flex';document.getElementById('regUser').value='';document.getElementById('regPass').value=''}

async function doLogin(){
  var u=document.getElementById('loginUser').value.trim();var p=document.getElementById('loginPass').value;
  if(!u||!p){showToast('请填写完整');return}
  if(u.indexOf('/')>=0||u.indexOf('\\')>=0||u.indexOf('__')>=0){showToast('用户名含非法字符');return}
  addLog('尝试登录: '+u);
  var info=await api('contents/'+USER_DIR+'/'+u+'.txt');
  if(!info||!info.content){showToast('用户不存在');addLog('登录失败: 用户不存在');return}
  var txt='';try{txt=decodeURIComponent(escape(atob(info.content.replace(/\s/g,''))))}catch(e){txt=atob(info.content.replace(/\s/g,''))}
  var lines=txt.split('\n');if(lines[0]!==p){showToast('密码错误');addLog('登录失败: 密码错误');return}
  if(lines[1].trim()!=='1'){showToast('账户待审核，联系管理员');addLog('登录失败: 待审核');return}
  currentUser=u;localStorage.setItem('chat_user',u);document.getElementById('loginModal').style.display='none';
  document.getElementById('mainApp').style.display='flex';loadedFolders={};document.getElementById('chatArea').innerHTML='';
  addLog('登录成功: '+u);loadMessages();pollingTimer=setInterval(loadMessages,2000)
}

async function doRegister(){
  var u=document.getElementById('regUser').value.trim();var p=document.getElementById('regPass').value;
  if(!u||!p){showToast('请填写完整');return}
  if(u.indexOf('/')>=0||u.indexOf('\\')>=0||u.indexOf('__')>=0){showToast('用户名含非法字符');return}
  if(!token){try{await initToken()}catch(e){}if(!token){showToast('系统错误，请刷新');return}}
  addLog('尝试注册: '+u);
  var check=await api('contents/'+USER_DIR+'/'+u+'.txt');
  if(check){showToast('用户名已被注册');addLog('注册失败: 用户名存在');return}
  var cont=p+'\n0';var b64=btoa(unescape(encodeURIComponent(cont)));

}

function logout(){if(pollingTimer)clearInterval(pollingTimer);currentUser='';localStorage.removeItem('chat_user');loadedFolders={};document.getElementById('mainApp').style.display='none';document.getElementById('welcomeModal').style.display='flex';addLog('已退出')}

function showAdminModal(){document.getElementById('adminModal').style.display='flex';document.getElementById('adminPass').value=''}

  }else{showToast('密码错误')}
}
